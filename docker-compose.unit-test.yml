#
# Docker Compose override for running unit tests
# Builds server image with testing configuration (includes fakeredis, enables sync RQ)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.unit-test.yml up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.unit-test.yml exec cvat_server_everex python manage.py test cvat.apps
#

services:
  cvat_server_everex:
    build:
      context: .
      args:
        CVAT_CONFIGURATION: testing
    environment:
      DJANGO_SETTINGS_MODULE: cvat.settings.testing

  cvat_worker_export_everex:
    build:
      context: .
      args:
        CVAT_CONFIGURATION: testing
    environment:
